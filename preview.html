<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGCAR Motors — PRÉVIA DAS ALTERAÇÕES</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .preview-banner {
      background: #e21818;
      color: white;
      text-align: center;
      padding: 10px;
      font-weight: bold;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 99999;
    }
    .estoque { padding-top: 100px; }
  </style>
</head>
<body>
  <div class="preview-banner">MODO DE PRÉVIA: VISUALIZAÇÃO DOS NOVOS BOTÕES</div>
  
  <section class="estoque">
    <div class="container">
      <h2 class="section-title">Nosso <span>Estoque (Exemplo)</span></h2>
      <div class="section-divider"></div>
      
      <div class="estoque-grid">
        <!-- CARD EXEMPLO 1 -->
        <div class="car-card">
          <div class="car-card-image">
            <img src="img/cars-showcase.webp" alt="Exemplo" style="width:100%; height:100%; object-fit:cover;">
            <div class="car-price-badge">R$ 85.900</div>
          </div>
          <div class="car-card-body">
            <h3>CIVIC G10 / 2018 / HONDA</h3>
            <p>2018 • Prata</p>
            <p>45.000 km</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <a href="detalhes_exemplo.html" class="btn btn-outline" style="padding: 0.875rem 1rem; font-size: 0.65rem;">Saiba Mais</a>
              <a href="#" class="btn btn-primary" style="padding: 0.875rem 1rem; font-size: 0.65rem;">Tenho interesse</a>
            </div>
          </div>
        </div>

        <!-- CARD EXEMPLO 2 -->
        <div class="car-card">
          <div class="car-card-image">
            <img src="img/cars-showcase.webp" alt="Exemplo" style="width:100%; height:100%; object-fit:cover;">
            <div class="car-price-badge">R$ 115.000</div>
          </div>
          <div class="car-card-body">
            <h3>COMPASS LONGITUDE / 2020 / JEEP</h3>
            <p>2020 • Branco</p>
            <p>32.000 km</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
              <a href="detalhes_exemplo.html" class="btn btn-outline" style="padding: 0.875rem 1rem; font-size: 0.65rem;">Saiba Mais</a>
              <a href="#" class="btn btn-primary" style="padding: 0.875rem 1rem; font-size: 0.65rem;">Tenho interesse</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
