<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGCAR — Área Logada</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Estilos específicos da área logada */
    body { background-color: #050505; }
    .login-screen { position: fixed; inset: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 2000; }
    .login-card { background: #111; padding: 3rem; border: 1px solid var(--primary); width: 100%; max-width: 400px; text-align: center; }
    .login-subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem; }
    .form-group { text-align: left; margin-bottom: 1.5rem; }
    .form-group label { display: block; color: var(--text-light); font-size: 0.8rem; margin-bottom: 0.5rem; text-transform: uppercase; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: white; padding: 0.8rem; border-radius: 4px; }
    .login-error { color: var(--primary); font-size: 0.8rem; margin-bottom: 1rem; display: none; }

    .dashboard { display: none; min-height: 100vh; }
    .sidebar { width: 260px; background: #111; border-right: 1px solid #222; padding: 2rem; position: fixed; height: 100vh; }
    .main-content { margin-left: 260px; padding: 3rem; width: calc(100% - 260px); }
    
    .sidebar-logo { margin-bottom: 3rem; text-align: center; }
    .sidebar-logo-sub { font-size: 0.7rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
    .sidebar-nav a { display: flex; align-items: center; gap: 1rem; color: var(--text-muted); padding: 1rem; border-radius: 8px; transition: 0.3s; margin-bottom: 0.5rem; }
    .sidebar-nav a.active, .sidebar-nav a:hover { background: rgba(226, 24, 24, 0.1); color: var(--primary); }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
    .stat-card { background: #111; padding: 1.5rem; border: 1px solid #222; border-radius: 12px; }
    .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
    .stat-label { color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; }

    .table-container { background: #111; border-radius: 12px; border: 1px solid #222; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #1a1a1a; text-align: left; padding: 1.2rem; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
    td { padding: 1.2rem; border-top: 1px solid #222; font-size: 0.9rem; }
    .car-img-mini { width: 50px; height: 35px; object-fit: cover; border-radius: 4px; }
    
    .actions { display: flex; gap: 0.5rem; }
    .btn-icon { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.3s; }
    .btn-icon:hover { color: var(--primary); }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 2rem; }
    .modal-content { background: #111; width: 100%; max-width: 600px; padding: 2.5rem; border-radius: 12px; border: 1px solid var(--primary); max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">
        <img src="img/logo.jpeg" alt="BGCAR Motors Logo" class="login-logo-img" />
      </div>
      <div class="login-subtitle">Área Logada — Gestão de Estoque</div>
      <div class="login-error" id="loginError">Usuário ou senha incorretos.</div>
      <form id="loginForm">
        <div class="form-group">
          <label>Usuário</label>
          <input type="text" id="username" required>
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">ENTRAR</button>
      </form>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-brand">
          <img src="img/logo.jpeg" alt="BGCAR Motors Logo" class="sidebar-logo-img" />
        </div>
        <div class="sidebar-logo-sub">Área Logada</div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active"><i class="fas fa-car"></i> Estoque</a>
        <a href="index.html"><i class="fas fa-external-link-alt"></i> Ver Site</a>
        <a href="#" id="logoutBtn" style="margin-top: 2rem; color: #ff4444;"><i class="fas fa-sign-out-alt"></i> Sair</a>
      </nav>
    </aside>

    <main class="main-content">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
        <div>
          <h1 style="font-family: var(--font-title); font-size: 2rem;">GESTÃO DE <span style="color: var(--primary);">ESTOQUE</span></h1>
          <p style="color: var(--text-muted);">Controle os veículos visíveis no site em tempo real.</p>
        </div>
        <button class="btn btn-primary" id="addCarBtn"><i class="fas fa-plus"></i> NOVO VEÍCULO</button>
      </header>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="totalCars">0</div>
          <div class="stat-label">Total no Estoque</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="totalValue">R$ 0</div>
          <div class="stat-label">Valor Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="syncStatus">OK</div>
          <div class="stat-label">Status Sincronização</div>
        </div>
      </div>

      <div class="table-container">
        <table id="carsTable">
          <thead>
            <tr>
              <th>Foto</th>
              <th>Modelo</th>
              <th>Ano</th>
              <th>Cor</th>
              <th>Preço</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>
            <!-- Dados via Supabase -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- MODAL ADICIONAR/EDITAR -->
  <div class="modal" id="carModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle" style="font-family: var(--font-title);">ADICIONAR VEÍCULO</h2>
        <button id="closeModal" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>
      <form id="carForm">
        <input type="hidden" id="carId">
        <div class="form-group">
          <label>Modelo do Veículo</label>
          <input type="text" id="carModel" placeholder="Ex: BMW M3 Competition" required>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Ano</label>
            <input type="text" id="carYear" placeholder="2023/2023" required>
          </div>
          <div class="form-group">
            <label>Preço (R$)</label>
            <input type="number" id="carPrice" placeholder="550000" required>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>Cor</label>
            <input type="text" id="carColor" placeholder="Preto Carbono" required>
          </div>
          <div class="form-group">
            <label>Câmbio</label>
            <select id="carTransmission">
              <option value="Automático">Automático</option>
              <option value="Manual">Manual</option>
            </select>
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label>KM</label>
            <input type="number" id="carKm" placeholder="15000" required>
          </div>
          <div class="form-group">
            <label>Final da Placa</label>
            <input type="text" id="carPlate" placeholder="7" required>
          </div>
        </div>
        <div class="form-group">
          <label>Fotos (Múltiplas)</label>
          <input type="file" id="carPhotos" multiple accept="image/*" style="border: 1px dashed #444; padding: 2rem; text-align: center;">
          <div id="photoGallery" class="gallery-grid"></div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">SALVAR NO ESTOQUE REAL</button>
      </form>
    </div>
  </div>

  <script>
    // CONFIGURAÇÃO SUPABASE
    const SUPABASE_URL = 'SUA_SUPABASE_URL_AQUI';
    const SUPABASE_KEY = 'SUA_SUPABASE_KEY_AQUI';
    let supabase = null;
    if (SUPABASE_URL !== 'SUA_SUPABASE_URL_AQUI') {
      supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    }

    const loginScreen = document.getElementById('loginScreen');
    const dashboard = document.getElementById('dashboard');
    const loginForm = document.getElementById('loginForm');
    const carModal = document.getElementById('carModal');
    const photoGallery = document.getElementById('photoGallery');
    let currentPhotos = [];

    // Login Simples
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      if (user === 'admin' && pass === 'bgcar2026') {
        loginScreen.style.display = 'none';
        dashboard.style.display = 'flex';
        loadDashboardData();
      } else {
        document.getElementById('loginError').style.display = 'block';
      }
    });

    // Logout
    document.getElementById('logoutBtn').onclick = () => location.reload();

    // Carregar Dados
    async function loadDashboardData() {
      if (!supabase) {
        alert("Supabase não configurado! Siga o guia no README.");
        return;
      }
      
      const { data: cars, error } = await supabase.from('cars').select('*').order('created_at', { ascending: false });
      if (error) return console.error(error);

      const tbody = document.querySelector('#carsTable tbody');
      tbody.innerHTML = '';
      let totalV = 0;

      cars.forEach(car => {
        const photos = Array.isArray(car.photos) ? car.photos : JSON.parse(car.photos || '[]');
        totalV += parseFloat(car.price);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><img src="${photos[0] || 'img/cars-showcase.webp'}" class="car-img-mini"></td>
          <td>${car.model}</td>
          <td>${car.year}</td>
          <td>${car.color}</td>
          <td>R$ ${parseFloat(car.price).toLocaleString('pt-BR')}</td>
          <td class="actions">
            <button class="btn-icon" onclick="editCar('${car.id}')"><i class="fas fa-edit"></i></button>
            <button class="btn-icon" onclick="deleteCar('${car.id}')"><i class="fas fa-trash"></i></button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('totalCars').innerText = cars.length;
      document.getElementById('totalValue').innerText = `R$ ${totalV.toLocaleString('pt-BR')}`;
    }

    // Modal Control
    document.getElementById('addCarBtn').onclick = () => {
      document.getElementById('carForm').reset();
      document.getElementById('carId').value = '';
      currentPhotos = [];
      photoGallery.innerHTML = '';
      document.getElementById('modalTitle').innerText = 'ADICIONAR VEÍCULO';
      carModal.style.display = 'flex';
    };
    document.getElementById('closeModal').onclick = () => carModal.style.display = 'none';

    // Upload de Fotos (Base64 para simplificar)
    document.getElementById('carPhotos').onchange = (e) => {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const base64 = event.target.result;
          currentPhotos.push(base64);
          renderGallery();
        };
        reader.readAsDataURL(file);
      });
    };

    function renderGallery() {
      photoGallery.innerHTML = '';
      currentPhotos.forEach((img, index) => {
        const div = document.createElement('div');
        div.className = 'gallery-item';
        div.innerHTML = `
          <img src="${img}">
          <button type="button" class="gallery-item-remove" onclick="removePhoto(${index})">&times;</button>
        `;
        photoGallery.appendChild(div);
      });
    }

    window.removePhoto = (index) => {
      currentPhotos.splice(index, 1);
      renderGallery();
    };

    // Salvar no Supabase
    document.getElementById('carForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('carId').value;
      const carData = {
        model: document.getElementById('carModel').value,
        year: document.getElementById('carYear').value,
        price: document.getElementById('carPrice').value,
        color: document.getElementById('carColor').value,
        transmission: document.getElementById('carTransmission').value,
        km: document.getElementById('carKm').value,
        plate: document.getElementById('carPlate').value,
        photos: currentPhotos
      };

      try {
        if (id) {
          await supabase.from('cars').update(carData).eq('id', id);
        } else {
          await supabase.from('cars').insert([carData]);
        }
        carModal.style.display = 'none';
        loadDashboardData();
      } catch (err) {
        alert("Erro ao salvar no banco de dados.");
      }
    };

    window.editCar = async (id) => {
      const { data: car } = await supabase.from('cars').select('*').eq('id', id).single();
      document.getElementById('carId').value = car.id;
      document.getElementById('carModel').value = car.model;
      document.getElementById('carYear').value = car.year;
      document.getElementById('carPrice').value = car.price;
      document.getElementById('carColor').value = car.color;
      document.getElementById('carTransmission').value = car.transmission;
      document.getElementById('carKm').value = car.km;
      document.getElementById('carPlate').value = car.plate;
      currentPhotos = Array.isArray(car.photos) ? car.photos : JSON.parse(car.photos || '[]');
      renderGallery();
      document.getElementById('modalTitle').innerText = 'EDITAR VEÍCULO';
      carModal.style.display = 'flex';
    };

    window.deleteCar = async (id) => {
      if (confirm('Deseja excluir este veículo permanentemente?')) {
        await supabase.from('cars').delete().eq('id', id);
        loadDashboardData();
      }
    };
  </script>
</body>
</html>
