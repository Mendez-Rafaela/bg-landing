<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGCAR Motors - Área Logada</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
}

/* LOGIN */
.login-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:#000;
z-index:999;
}

.login-box{
width:100%;
max-width:420px;
background:#111;
padding:35px;
border-radius:14px;
border:1px solid #222;
}

.login-logo{
width:180px;
display:block;
margin:0 auto 18px auto;
border-radius:10px;
}

.login-box p{
color:#aaa;
margin-bottom:20px;
text-align:center;
font-size:15px;
}

input, textarea{
width:100%;
padding:13px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #222;
background:#181818;
color:#fff;
outline:none;
}

input:focus,
textarea:focus{
border-color:#e21818;
}

button{
border:none;
cursor:pointer;
border-radius:8px;
padding:12px;
font-weight:700;
}

.btn-primary{
background:#e21818;
color:#fff;
}

#loginError{
display:none;
color:#ff9090;
margin-top:10px;
text-align:center;
}

/* DASHBOARD */
.dashboard{
display:none;
min-height:100vh;
}

.sidebar{
position:fixed;
top:0;
left:0;
bottom:0;
width:240px;
background:#111;
padding:25px;
border-right:1px solid #222;
}

.logo{
text-align:center;
margin-bottom:30px;
}

.logo img{
width:170px;
border-radius:10px;
}

.sidebar button{
width:100%;
margin-bottom:12px;
}

.logout{
position:absolute;
bottom:20px;
left:20px;
right:20px;
width: calc(100% - 40px) !important;
}

.main{
margin-left:240px;
padding:30px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:22px;
}

.top h1{
font-size:28px;
}

/* LISTA */
.cars-grid{
display:flex;
flex-direction:column;
gap:12px;
}

/* CARD */
.car-card{
display:flex;
align-items:center;
gap:14px;
background:#111;
border:1px solid #222;
padding:12px;
border-radius:12px;
transition:.2s;
}

.car-card:hover{
border-color:#e21818;
}

/* FOTO */
.car-image{
width:75px;
height:55px;
border-radius:8px;
overflow:hidden;
flex-shrink:0;
}

.car-image img{
width:100%;
height:100%;
object-fit:cover;
}

/* INFO */
.car-info{
flex:1;
}

.car-brand{
font-size:12px;
font-weight:700;
color:#e21818;
text-transform:uppercase;
margin-bottom:2px;
}

.car-model{
font-size:20px;
font-weight:800;
margin-bottom:5px;
}

.car-line{
font-size:13px;
color:#ccc;
margin-bottom:4px;
}

.price{
font-size:18px;
font-weight:800;
}

/* BOTÕES */
.car-actions{
display:flex;
flex-direction:column;
gap:8px;
width:110px;
}

.car-actions button{
padding:10px;
font-size:13px;
}

.edit{
background:#e21818;
color:#fff;
}

.delete{
background:#2a1212;
color:#ff8d8d;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.modal.active{
display:flex;
}

.modal-box{
width:100%;
max-width:720px;
background:#111;
padding:25px;
border-radius:14px;
max-height:90vh;
overflow:auto;
}

.modal-box h2{
margin-bottom:18px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.preview img{
width:90px;
height:90px;
border-radius:10px;
object-fit:cover;
margin-top:10px;
}

.actions{
display:flex;
gap:10px;
margin-top:16px;
}

/* MOBILE */
@media(max-width:768px){

.sidebar{
position:relative;
width:100%;
height:auto;
}

.main{
margin-left:0;
padding:20px;
}

.top{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.row{
grid-template-columns:1fr;
}

.car-card{
gap:10px;
}

.car-image{
width:70px;
height:50px;
}

.car-model{
font-size:16px;
}

.car-actions{
width:95px;
}

.car-actions button{
padding:8px;
font-size:12px;
}

}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-box">

<img src="img/logo.jpeg" class="login-logo">

<p>Área Logada</p>

<form id="loginForm">
<input type="text" id="username" placeholder="Usuário" required>
<input type="password" id="password" placeholder="Senha" required>

<button type="submit" class="btn-primary" style="width:100%">
Entrar
</button>
</form>

<div id="loginError">Login inválido</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<div class="sidebar">

<div class="logo">
<img src="img/logo.jpeg">
</div>

<button class="btn-primary" onclick="openModal()">
+ Novo Carro
</button>

<button class="btn-primary logout" onclick="logout()">
Sair
</button>

</div>

<div class="main">

<div class="top">
<h1>Estoque</h1>

<button class="btn-primary" onclick="openModal()">
+ Novo Carro
</button>
</div>

<div class="cars-grid" id="carsGrid"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<h2>Novo Veículo</h2>

<form id="carForm">

<div class="row">
<input type="text" id="carMarca" placeholder="Marca" required>
<input type="text" id="carModelo" placeholder="Modelo" required>
</div>

<div class="row">
<input type="number" id="carAno" placeholder="Ano" required>
<input type="text" id="carCor" placeholder="Cor" required>
</div>

<div class="row">
<input type="number" id="carKm" placeholder="KM" required>
<input type="number" id="carValor" placeholder="Valor" required>
</div>

<textarea id="carDescricao" rows="4" placeholder="Descrição"></textarea>

<input type="file" id="carPhotos" accept="image/*" multiple>

<div class="preview" id="photoGallery"></div>

<div class="actions">
<button type="submit" class="btn-primary" style="flex:1">
Salvar
</button>

<button type="button" onclick="closeModal()" style="flex:1">
Cancelar
</button>
</div>

</form>

</div>
</div>

<script src="admin.js"></script>

</body>
</html>
