<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGCAR Motors — Área Logada</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial, Helvetica, sans-serif;
}

.login-screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#000;
}

.login-box{
  width:100%;
  max-width:420px;
  background:#111;
  padding:30px;
  border:1px solid #333;
  border-radius:10px;
}

.login-box h1{
  margin:0 0 20px;
  color:#e21818;
}

input, textarea{
  width:100%;
  padding:12px;
  margin-bottom:12px;
  background:#1b1b1b;
  border:1px solid #333;
  color:#fff;
  border-radius:6px;
}

button{
  padding:12px 18px;
  border:none;
  cursor:pointer;
  border-radius:6px;
}

.btn-primary{
  background:#e21818;
  color:#fff;
}

.dashboard{
  display:none;
}

.sidebar{
  width:250px;
  background:#111;
  min-height:100vh;
  position:fixed;
  padding:20px;
}

.main{
  margin-left:250px;
  padding:30px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.cars-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  margin-top:30px;
}

.car-card{
  background:#111;
  border:1px solid #333;
  border-radius:10px;
  overflow:hidden;
}

.car-card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.car-info{
  padding:15px;
}

.car-actions{
  margin-top:15px;
}

.btn-delete{
  background:#c40000;
  color:#fff;
  width:100%;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-box{
  width:100%;
  max-width:700px;
  background:#111;
  padding:30px;
  border-radius:10px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

#photoGallery img{
  width:80px;
  height:80px;
  object-fit:cover;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>Área Logada</h1>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Usuário" required>
      <input type="password" id="password" placeholder="Senha" required>

      <button type="submit" class="btn-primary" style="width:100%;">
        Entrar
      </button>
    </form>

    <p id="loginError" style="color:red;display:none;margin-top:15px;">
      Usuário ou senha inválidos
    </p>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <aside class="sidebar">
    <h2>BGCAR</h2>

    <button onclick="openModal()" class="btn-primary" style="width:100%;margin-top:20px;">
      Novo Carro
    </button>

    <button onclick="logout()" style="width:100%;margin-top:15px;">
      Sair
    </button>
  </aside>

  <main class="main">

    <div class="top">
      <h1>Estoque</h1>
    </div>

    <div class="cars-grid" id="carsGrid"></div>

  </main>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">

    <h2>Novo Carro</h2>

    <form id="carForm">

      <div class="row">
        <input type="text" id="carMarca" placeholder="Marca" required>
        <input type="text" id="carModelo" placeholder="Modelo" required>
      </div>

      <div class="row">
        <input type="number" id="carAno" placeholder="Ano" required>
        <input type="text" id="carCor" placeholder="Cor" required>
      </div>

      <div class="row">
        <input type="number" id="carKm" placeholder="KM" required>
        <input type="number" id="carValor" placeholder="Valor" required>
      </div>

      <textarea id="carDescricao" placeholder="Descrição"></textarea>

      <input type="file" id="carPhotos" accept="image/*">

      <div id="photoGallery"></div>

      <div style="display:flex;gap:10px;margin-top:20px;">
        <button type="submit" class="btn-primary" style="flex:1;">
          Salvar
        </button>

        <button type="button" onclick="closeModal()" style="flex:1;">
          Cancelar
        </button>
      </div>

    </form>

  </div>
</div>

<script src="admin.js"></script>

</body>
</html>
